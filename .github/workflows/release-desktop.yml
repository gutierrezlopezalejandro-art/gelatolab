name: Release desktop (Tauri)

# Se dispara con tags semver (v1.0.0, v1.2.3-beta.1) o manualmente.
# Genera un Release de GitHub con los instaladores adjuntos.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Permisos del GITHUB_TOKEN para crear el Release (default es read-only).
permissions:
  contents: write

jobs:
  build-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # Targets vacios — rustup usa el default del runner.
            target: ''
            args: ''
          - os: macos-latest
            # Para universal-apple-darwin se necesitan ambos targets
            # instalados; tauri-action los combina al pasar el flag --target
            # universal-apple-darwin en args.
            target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target universal-apple-darwin'
          - os: ubuntu-22.04
            target: ''
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # fetch-depth: 0 + fetch-tags: true asegura que se descargan los
        # objects completos de los tags anotados (no solo el ref). Sin esto
        # `git tag -l --format='%(contents:body)'` cae en el cuerpo del
        # commit en vez de la annotation del tag — bug visto en v1.0.10.
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract tag annotation body
        id: tag_body
        # Lee el body del tag annotation (creado con `git tag -a vX.Y.Z -m "..."`)
        # y lo expone como output. Si por alguna razon el tag no tiene body
        # (creacion lightweight), fallback a un mensaje generico.
        #
        # Defense in depth: hacemos un git fetch explicito del tag como
        # objeto anotado antes de leer, por si fetch-tags no llego a traer
        # la annotation completa.
        shell: bash
        run: |
          git fetch --no-tags --no-recurse-submodules origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" || true
          BODY=$(git for-each-ref --format='%(contents:body)' "refs/tags/${GITHUB_REF_NAME}")
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}. Ver commits desde el release anterior para el detalle de cambios."
          fi
          {
            echo 'body<<EOF_TAG_BODY'
            echo "$BODY"
            echo 'EOF_TAG_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps (only on ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        # webkit2gtk-4.1 + libsoup3 son los req minimos de Tauri 2 en Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Las mismas VITE_* del deploy web. Se inyectan al bundle nativo.
          VITE_SUPABASE_URL:     ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN:       ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.VITE_PLAUSIBLE_DOMAIN }}
          VITE_PLAUSIBLE_HOST:   ${{ secrets.VITE_PLAUSIBLE_HOST }}
          # Firma Ed25519 del auto-updater. tauri-action detecta estas vars
          # y genera latest.json + assets .sig por bundle. Sin estas vars
          # el build sigue funcionando pero sin firma — los clientes con
          # pubkey configurada rechazarian el update por firma invalida.
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing. APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID
          # se omiten aqui a proposito: tauri-action los usaria para notarizacion
          # con xcrun notarytool --wait, que mantiene una conexion abierta y falla
          # con NSURLError -1009 cuando el runner de GitHub pierde la red tras
          # 30+ min de polling. La notarizacion se hace en el step siguiente con
          # retry por polling corto (requests independientes, resistente a caidas).
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GelatoLab ${{ github.ref_name }}'
          # releaseBody se llena con el body del tag annotation extraido
          # arriba. Esto se propaga tambien al campo `notes` de latest.json,
          # que es lo que el modal de auto-update muestra al usuario al
          # ofrecer la actualizacion. Antes era un texto generico hardcoded
          # que no le decia al usuario que cambio en cada version.
          releaseBody: ${{ steps.tag_body.outputs.body }}
          # No-draft: el auto-updater de los clientes ya instalados consulta
          # /releases/latest/download/latest.json — un draft nunca aparece
          # ahi y nadie recibiria la actualizacion.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Notarizacion separada de tauri-action para evitar NSURLError -1009.
      # tauri-action usa xcrun notarytool --wait (una sola conexion larga).
      # Este step hace: submit sin --wait → submission ID inmediato →
      # polling corto cada 2 min (requests independientes) → staple → re-upload.
      # Con esto, una caida puntual de red solo falla un poll, no el job entero.
      - name: Notarize macOS .dmg
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME:       ${{ github.ref_name }}
        run: |
          set -e
          DMG=$(find src-tauri/target -name "*.dmg" | head -1)
          echo "Notarizing: $DMG"

          # Submit sin --wait → retorna submission ID de inmediato
          SUBMIT_JSON=$(xcrun notarytool submit "$DMG" \
            --apple-id  "$APPLE_ID" \
            --password  "$APPLE_PASSWORD" \
            --team-id   "$APPLE_TEAM_ID" \
            --output-format json)
          echo "$SUBMIT_JSON"
          SUBMISSION_ID=$(echo "$SUBMIT_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Poll cada 2 min, hasta 90 min (45 intentos).
          # Cada iteracion es un request HTTPS independiente: si la red cae
          # un momento, el siguiente intento sigue funcionando.
          STATUS="In Progress"
          for i in $(seq 1 45); do
            sleep 120
            # Limpiar cache DNS antes de cada poll (workaround -1009 stale cache)
            sudo dscacheutil -flushcache  2>/dev/null || true
            sudo killall -HUP mDNSResponder 2>/dev/null || true

            INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id  "$APPLE_ID" \
              --password  "$APPLE_PASSWORD" \
              --team-id   "$APPLE_TEAM_ID" \
              --output-format json 2>/dev/null || echo '{"status":"Unknown"}')
            STATUS=$(echo "$INFO_JSON" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))")
            echo "Intento $i/45 — status: $STATUS"

            if [ "$STATUS" = "Accepted" ]; then break; fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
                --team-id  "$APPLE_TEAM_ID"
              exit 1
            fi
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarizacion timeout tras 90 minutos"
            exit 1
          fi

          # Staplear ticket y reemplazar el .dmg sin notarizar en el release
          xcrun stapler staple "$DMG"
          gh release upload "$TAG_NAME" "$DMG" --clobber
          echo "DMG notarizado subido al release $TAG_NAME"

      # Firma de instaladores Windows con SSL.com eSigner (cloud signing).
      # tauri-action sube .exe y .msi sin firma Authenticode. Este step los
      # firma via eSigner y los reemplaza en el release con --clobber.
      # Sin firma, Windows SmartScreen bloquea la instalacion con warning rojo.
      - name: Find Windows installers
        if: matrix.os == 'windows-latest'
        id: find_win
        shell: pwsh
        run: |
          $exe   = (Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe"      | Select-Object -First 1).FullName
          $msiEn = (Get-ChildItem "src-tauri/target/release/bundle/msi/*en-US.msi" | Select-Object -First 1).FullName
          $msiEs = (Get-ChildItem "src-tauri/target/release/bundle/msi/*es-ES.msi" | Select-Object -First 1).FullName
          "exe=$exe"       >> $env:GITHUB_OUTPUT
          "msi_en=$msiEn" >> $env:GITHUB_OUTPUT
          "msi_es=$msiEs" >> $env:GITHUB_OUTPUT
          Write-Host "EXE:    $exe"
          Write-Host "MSI EN: $msiEn"
          Write-Host "MSI ES: $msiEs"

      # Diagnostico: listar credential IDs reales de la API CSC de SSL.com.
      # El ID que muestra eSigner Express puede diferir del que usa CodeSignTool.
      - name: Debug - List SSL.com credential IDs
        if: matrix.os == 'windows-latest'
        uses: sslcom/esigner-codesign@develop
        with:
          command:          get_credential_ids
          username:         ${{ secrets.SSL_COM_USERNAME }}
          password:         ${{ secrets.SSL_COM_PASSWORD }}
          totp_secret:      ${{ secrets.SSL_COM_TOTP_SECRET }}
          environment_name: PROD

      - name: Sign .exe with SSL.com eSigner
        if: matrix.os == 'windows-latest'
        uses: sslcom/esigner-codesign@develop
        with:
          command:          sign
          username:         ${{ secrets.SSL_COM_USERNAME }}
          password:         ${{ secrets.SSL_COM_PASSWORD }}
          credential_id:    ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret:      ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path:        ${{ steps.find_win.outputs.exe }}
          output_path:      ${{ github.workspace }}/signed-win
          environment_name: PROD
          malware_block:    false

      - name: Sign .msi en-US with SSL.com eSigner
        if: matrix.os == 'windows-latest'
        uses: sslcom/esigner-codesign@develop
        with:
          command:          sign
          username:         ${{ secrets.SSL_COM_USERNAME }}
          password:         ${{ secrets.SSL_COM_PASSWORD }}
          credential_id:    ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret:      ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path:        ${{ steps.find_win.outputs.msi_en }}
          output_path:      ${{ github.workspace }}/signed-win
          environment_name: PROD
          malware_block:    false

      - name: Sign .msi es-ES with SSL.com eSigner
        if: matrix.os == 'windows-latest'
        uses: sslcom/esigner-codesign@develop
        with:
          command:          sign
          username:         ${{ secrets.SSL_COM_USERNAME }}
          password:         ${{ secrets.SSL_COM_PASSWORD }}
          credential_id:    ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret:      ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path:        ${{ steps.find_win.outputs.msi_es }}
          output_path:      ${{ github.workspace }}/signed-win
          environment_name: PROD
          malware_block:    false

      - name: Re-upload signed Windows installers
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME:     ${{ github.ref_name }}
        run: |
          Get-ChildItem "${{ github.workspace }}/signed-win" | ForEach-Object {
            Write-Host "Subiendo firmado: $($_.Name)"
            gh release upload $env:TAG_NAME $_.FullName --clobber
          }
