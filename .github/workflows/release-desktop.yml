name: Release desktop (Tauri)

# Se dispara con tags semver (v1.0.0, v1.2.3-beta.1) o manualmente.
# Genera un Release de GitHub con los instaladores adjuntos.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Permisos del GITHUB_TOKEN para crear el Release (default es read-only).
permissions:
  contents: write

jobs:
  build-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # Targets vacios — rustup usa el default del runner.
            target: ''
            args: ''
          - os: macos-latest
            # Para universal-apple-darwin se necesitan ambos targets
            # instalados; tauri-action los combina al pasar el flag --target
            # universal-apple-darwin en args.
            target: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target universal-apple-darwin'
          - os: ubuntu-22.04
            target: ''
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps (only on ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        # webkit2gtk-4.1 + libsoup3 son los req minimos de Tauri 2 en Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Las mismas VITE_* del deploy web. Se inyectan al bundle nativo.
          VITE_SUPABASE_URL:     ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN:       ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.VITE_PLAUSIBLE_DOMAIN }}
          VITE_PLAUSIBLE_HOST:   ${{ secrets.VITE_PLAUSIBLE_HOST }}
          # Firma Ed25519 del auto-updater. tauri-action detecta estas vars
          # y genera latest.json + assets .sig por bundle. Sin estas vars
          # el build sigue funcionando pero sin firma — los clientes con
          # pubkey configurada rechazarian el update por firma invalida.
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GelatoLab ${{ github.ref_name }}'
          releaseBody: |
            Instaladores de la app de escritorio. Todavia sin firma de codigo
            (Windows/Mac mostraran un warning la primera vez — abrir igual).

            **Windows**: descarga el `.msi` o `.exe` (NSIS).
            **macOS**: descarga el `.dmg` (universal Intel + Apple Silicon).
            **Linux**: descarga el `.AppImage` o `.deb`.

            > Si ya tienes GelatoLab instalado, no necesitas descargar nada
            > — la app detecta esta version y te ofrece actualizar al abrirla.
          # No-draft: el auto-updater de los clientes ya instalados consulta
          # /releases/latest/download/latest.json — un draft nunca aparece
          # ahi y nadie recibiria la actualizacion.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
