name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        # --legacy-peer-deps por conflicto vite 5 vs basic-ssl 2.3 (no
        # bloqueante; revisar al subir a vite 6).
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm test

      - name: Build
        # Las VITE_* se inyectan al build via secrets del repo. Si el secret
        # no esta configurado pasa string vacio y la feature queda desactivada
        # (idem que correr sin .env). No es necesario definirlas todas.
        env:
          VITE_SUPABASE_URL:     ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN:       ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: ${{ secrets.VITE_PLAUSIBLE_DOMAIN }}
          VITE_PLAUSIBLE_HOST:   ${{ secrets.VITE_PLAUSIBLE_HOST }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Auto-enable Pages on first run if it's not yet configured. Avoids
          # the "Get Pages site failed: Not Found" error when the repo has
          # never had Pages turned on.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
