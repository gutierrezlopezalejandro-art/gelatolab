<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sin background — fondo transparente. Los colores del matraz se
       eligieron para verse bien tanto en fondos claros como oscuros:
       outline oscuro + relleno mint con buena opacidad + cereza dorada
       (alto contraste sobre cualquier fondo). -->

  <!-- Main logo group, centered -->
  <g transform="translate(256, 200)">
    <!-- Flask body (trapezoid) — outline oscuro + relleno mint translúcido -->
    <path
      d="M -65 0 L -65 -105 L 65 -105 L 65 0 L 145 200 Q 145 240 105 240 L -105 240 Q -145 240 -145 200 Z"
      fill="#a8d4b8"
      fill-opacity="0.25"
      stroke="#1a5c3a"
      stroke-width="14"
      stroke-linejoin="round"
    />
    <!-- Flask top rim -->
    <line x1="-85" y1="-105" x2="85" y2="-105" stroke="#1a5c3a" stroke-width="16" stroke-linecap="round"/>

    <!-- Liquid inside — verde mint sólido para destacar -->
    <path
      d="M -120 130 Q -90 110 -60 130 Q -30 150 0 130 Q 30 110 60 130 Q 90 150 120 130 L 145 200 Q 145 240 105 240 L -105 240 Q -145 240 -145 200 Z"
      fill="#1a5c3a"
      fill-opacity="0.85"
    />

    <!-- Ice cream scoop — cream con outline oscuro para verse en fondo claro -->
    <circle cx="0" cy="-105" r="75" fill="#f5e6c8" stroke="#1a5c3a" stroke-width="10"/>
    <!-- Scoop highlight -->
    <ellipse cx="-22" cy="-125" rx="22" ry="18" fill="#ffffff" fill-opacity="0.6"/>

    <!-- Cherry on top — dorado fuerte, alto contraste -->
    <circle cx="0" cy="-195" r="22" fill="#b8860b" stroke="#5c3d00" stroke-width="3"/>
    <!-- Cherry stem -->
    <path d="M 0 -212 Q 10 -232 25 -227" stroke="#2d7a52" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wordmark — colores oscuros para contrastar en fondos claros -->
  <text x="256" y="470" text-anchor="middle" font-family="serif" font-size="52" font-weight="700" letter-spacing="2">
    <tspan fill="#1a5c3a">Gelato</tspan><tspan fill="#b8860b">Lab</tspan>
  </text>
</svg>
