<!DOCTYPE html>

    <meta name="apple-mobile-web-app-title" content="GelatoLab" />

    <!-- SEO -->
    <title>GelatoLab — Formulación profesional de helados y gelatos</title>

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GelatoLab — Formulación profesional de helados" />
    <meta name="twitter:description" content="Herramienta profesional para formular helados, gelatos y sorbetes." />
    <meta name="twitter:image" content="./icons/icon-512.png" />

    <!-- Manifest: vite-plugin-pwa lo inyecta automaticamente en build como
         <link rel="manifest" href="./manifest.webmanifest"> al final del head.
         No lo declaramos aca para evitar el duplicado. (public/manifest.json
         viejo se mantiene como fallback si algun crawler lo pide por nombre
         directo, pero NO esta linkeado desde el HTML.) -->
    <!-- Apple Touch Icons multi-size: iOS elige el mejor segun densidad de pantalla.
         Todos tienen fondo opaco (verde brand) — iOS aplica su propia mascara
         redondeada y queda mal con fondo transparente. -->
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="./icons/apple-touch-icon-120.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <meta name="theme-color" content="#1a1a1a" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Structured data: ayuda a Google/Bing a clasificar la app correctamente
         en resultados ricos y a aparecer como SoftwareApplication. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GelatoLab",
      "description": "Herramienta profesional para formulación de helados artesanales, gelatos y sorbetes. Calcula FPD, PAC, POD, curva de congelamiento, valores nutricionales y costos de producción.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Windows, macOS, Linux, iOS",
      "url": "https://gelatolab.app/",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Cálculos FPD, PAC, POD",
        "Curva de congelamiento polinomial",
        "Auto-balance de receta",
        "Inventario integrado con descuento automático",
        "Etiquetado Ley 20.606 (Chile) y RDC 429 (Brasil)",
        "Bitácora HACCP",
        "Múltiples idiomas (ES/EN/PT/FR/DE/IT/KO/JA)",
        "Escáner de códigos de barras desde iPhone"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service Worker registration condicional al entorno:
      //   - Web prod (gelatolab.app): register sw.js → pre-cache + offline.
      //   - Localhost dev: unregister, evita stale-chunk con Vite HMR.
      //   - Tauri desktop: unregister + limpiar caches. La app ya tiene el
      //     bundle local en el binario, un SW solo causa stale chunks y
      //     pantalla blanca al actualizar (incidente v1.0.6 → v1.0.9).
      // El SW lo genera vite-plugin-pwa al build (Workbox, pre-cachea ~70
      // assets/8.4MB del bundle Vite). injectRegister:false en vite.config.js
      // para que el plugin NO meta su propio script — registramos aca con guard.
      (function () {
        if (!('serviceWorker' in navigator)) return;
        var isLocal = ['localhost', '127.0.0.1'].indexOf(location.hostname) !== -1;
        var isTauri = !!(window.__TAURI_INTERNALS__ || window.__TAURI__);
        if (isLocal || isTauri) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
          if (window.caches) {
            caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
          }
          return;
        }
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js');
        });
      })();
    </script>
  </body>
</html>
