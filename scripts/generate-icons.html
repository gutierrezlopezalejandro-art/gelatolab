<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Generate PWA Icons for GelatoLab</h2>
<p>Right-click each image below and "Save image as..." to the <code>public/icons/</code> folder.</p>

<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>

<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>

<h3>icon-maskable-512.png (with padding)</h3>
<canvas id="cm512" width="512" height="512"></canvas>

<h3>apple-touch-icon.png (180x180)</h3>
<canvas id="c180" width="180" height="180"></canvas>

<script>
function drawIcon(ctx, size, maskable) {
  const s = size;
  const pad = maskable ? s * 0.1 : 0;
  const inner = s - pad * 2;

  // Background
  ctx.fillStyle = '#1a2c1a';
  if (maskable) {
    ctx.fillRect(0, 0, s, s);
  } else {
    const r = s * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(s-r, 0); ctx.quadraticCurveTo(s, 0, s, r);
    ctx.lineTo(s, s-r); ctx.quadraticCurveTo(s, s, s-r, s);
    ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s-r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();
  }

  const cx = s/2, cy = s*0.42;
  const scoopR = inner * 0.16;

  // Cone
  ctx.fillStyle = '#d4a04a';
  ctx.beginPath();
  ctx.moveTo(cx - scoopR*0.7, cy + scoopR*0.3);
  ctx.lineTo(cx + scoopR*0.7, cy + scoopR*0.3);
  ctx.lineTo(cx + scoopR*0.1, cy + scoopR*2.2);
  ctx.lineTo(cx - scoopR*0.1, cy + scoopR*2.2);
  ctx.fill();

  // Scoop
  ctx.fillStyle = '#f5e6c8';
  ctx.beginPath();
  ctx.arc(cx, cy - scoopR*0.15, scoopR, 0, Math.PI*2);
  ctx.fill();

  // Text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fontSize = inner * 0.1;
  ctx.font = `bold ${fontSize}px sans-serif`;
  const textY = s * 0.85;

  ctx.fillStyle = '#f5e6c8';
  const metrics = ctx.measureText('Gelato');
  const gelatoW = metrics.width;
  ctx.fillText('Gelato', cx - fontSize*0.3, textY);

  ctx.fillStyle = '#d4a04a';
  ctx.fillText('Lab', cx + gelatoW*0.55, textY);
}

[[document.getElementById('c192'), 192, false],
 [document.getElementById('c512'), 512, false],
 [document.getElementById('cm512'), 512, true],
 [document.getElementById('c180'), 180, false],
].forEach(([canvas, size, mask]) => {
  drawIcon(canvas.getContext('2d'), size, mask);
  // Convert to downloadable image
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  img.style.border = '1px solid #ccc';
  canvas.parentNode.insertBefore(img, canvas.nextSibling);
});
</script>
</body>
</html>
